<!DOCTYPE html>
<html>
<head>
    <style>
body {
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    font-family: 'Segoe UI', sans-serif;
}

.card {
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.btn {
    border-radius: 10px;
}

.navbar {
    border-radius: 0 0 15px 15px;
}

.table {
    border-radius: 10px;
    overflow: hidden;
}
</style>
<style>
/* LIGHT (default) */
body {
    background: #f8fafc;
    color: #111827;
}

/* DARK MODE */
        body.dark {
            background: linear-gradient(135deg, #020617, #0f172a);
            color: #f9fafb;
        }

        body.dark .card {
            background: #1f2937;
            color: white;
        }

        body.dark .navbar {
            background: #020617 !important;
        }

        /* FIX TABLE (IMPORTANT) */
        body.dark .table,
        body.dark .table th,
        body.dark .table td {
            background-color: #1f2937 !important;
            color: white !important;
        }

        body.dark .table thead {
            background-color: #374151 !important;
        }

        body.dark .table tbody tr:hover {
            background-color: #2d3748 !important;
        }

        /* REMOVE bootstrap bg-light effect */
        body.dark.bg-light {
            background: linear-gradient(135deg, #020617, #0f172a) !important;
        }

/* Buttons */
body.dark .btn {
    border: none;
}

/* Topbar */
body.dark .topbar {
    background: #1f2937;
}
</style>
    <title>Edit Employee</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Payroll Dashboard</a>
    <button class="btn btn-outline-light" onclick="toggleDarkMode()">🌙</button>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card shadow-lg rounded-4 p-4" style="width: 400px;">

        <h3 class="fw-bold mb-3 text-center">Edit Employee</h3>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Employee Name</label>
                <input type="text" name="name" value="{{ employee[1] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Monthly Salary</label>
                <input type="number" name="salary" value="{{ employee[2] }}" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-dark w-100 mb-2">
                <i class="bi bi-pencil"></i> Update Employee
            </button>

            <a href="/" class="btn btn-outline-secondary w-100">Cancel</a>

        </form>

    </div>

</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("bg-dark");
    document.body.classList.toggle("text-light");

    document.querySelectorAll(".card").forEach(c => c.classList.toggle("bg-secondary"));

    localStorage.setItem("darkMode", document.body.classList.contains("bg-dark"));
}

window.onload = function() {
    if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("bg-dark", "text-light");

        document.querySelectorAll(".card").forEach(c => c.classList.add("bg-secondary"));
    }
}
</script>
<script>
function toggleDark() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

// Load saved theme
window.onload = function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
};
</script>
</body>
</html>
