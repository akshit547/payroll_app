<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Payroll Dashboard</a>
    <button class="btn btn-outline-light" onclick="toggleDarkMode()">🌙</button>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card shadow-lg rounded-4 p-4" style="width: 400px;">

        <h3 class="fw-bold mb-3 text-center">Edit Employee</h3>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Employee Name</label>
                <input type="text" name="name" value="{{ employee[1] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Monthly Salary</label>
                <input type="number" name="salary" value="{{ employee[2] }}" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-dark w-100 mb-2">
                <i class="bi bi-pencil"></i> Update Employee
            </button>

            <a href="/" class="btn btn-outline-secondary w-100">Cancel</a>

        </form>

    </div>

</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("bg-dark");
    document.body.classList.toggle("text-light");

    document.querySelectorAll(".card").forEach(c => c.classList.toggle("bg-secondary"));

    localStorage.setItem("darkMode", document.body.classList.contains("bg-dark"));
}

window.onload = function() {
    if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("bg-dark", "text-light");

        document.querySelectorAll(".card").forEach(c => c.classList.add("bg-secondary"));
    }
}
</script>

</body>
</html>
