<!DOCTYPE html>
<html>
<head>
    <title>Calculate Salary</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Payroll App</a>
    <button class="btn btn-outline-light" onclick="toggleDarkMode()">🌙</button>
  </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>Calculate Salary for {{ employee[1] }}</h2>

        <form method="POST">

            <div class="mb-3">
                <label>Days Worked</label>
                <input type="number" name="days" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Overtime</label>
                <input type="number" name="overtime" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Bonus</label>
                <input type="number" name="bonus" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success">
                <i class="bi bi-calculator"></i> Calculate
            </button>

            <a href="/" class="btn btn-secondary">Back</a>

        </form>

    </div>

</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("bg-dark");
    document.body.classList.toggle("text-light");

    document.querySelectorAll(".card").forEach(c => c.classList.toggle("bg-secondary"));

    if (document.body.classList.contains("bg-dark")) {
        localStorage.setItem("darkMode", "on");
    } else {
        localStorage.setItem("darkMode", "off");
    }
}

window.onload = function() {
    if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("bg-dark", "text-light");

        document.querySelectorAll(".card").forEach(c => c.classList.add("bg-secondary"));
    }
}
</script>

</body>
</html>
