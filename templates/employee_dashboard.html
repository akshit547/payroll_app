<!DOCTYPE html>
<html>
<head>
    <style>
body {
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    font-family: 'Segoe UI', sans-serif;
}

.card {
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.btn {
    border-radius: 10px;
}

.navbar {
    border-radius: 0 0 15px 15px;
}

.table {
    border-radius: 10px;
    overflow: hidden;
}
</style>
<style>
/* LIGHT (default) */
body {
    background: #f8fafc;
    color: #111827;
}

/* DARK MODE */
body.dark {
    background: #111827;
    color: #f9fafb;
}

/* Cards */
body.dark .card,
body.dark .card-box,
body.dark .table-box {
    background: #1f2937;
    color: white;
}

/* Table */
body.dark table {
    color: white;
}

/* Sidebar */
body.dark .sidebar {
    background: #020617;
}

/* Buttons */
body.dark .btn {
    border: none;
}

/* Topbar */
body.dark .topbar {
    background: #1f2937;
}
</style>
    <title>My Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">Employee Dashboard</span>
    <a href="/logout" class="btn btn-outline-light">Logout</a>
  </div>
</nav>

<div class="container mt-5 d-flex justify-content-center">

    <div class="card shadow-lg p-4 text-center" style="width: 400px;">

        <h3 class="mb-3">{{ employee[1] }}</h3>

        <h5>💰 Salary: ₹{{ employee[2] }}</h5>

        <hr>

        <p>✅ Present Days: <strong>{{ present }}</strong></p>
        <p>❌ Absent Days: <strong>{{ absent }}</strong></p>

        <a href="/calculate/{{ employee[0] }}" class="btn btn-dark mt-3">
            View Salary
        </a>
        <a href="/payslip/{{ employee[0] }}" class="btn btn-success mt-2">
    Download Payslip
</a>

    </div>

</div>
<script>
function toggleDark() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

// Load saved theme
window.onload = function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
};
</script>
</body>
</html>
