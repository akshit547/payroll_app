<!DOCTYPE html>
<html>
<head>
    <title>Payroll SaaS</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
            transition: 0.3s;
        }

        /* SIDEBAR */
        .sidebar {
            width: 230px;
            height: 100vh;
            position: fixed;
            background: #111827;
            color: white;
            padding: 20px;
            transition: 0.3s;
        }

        .sidebar a {
            display: block;
            color: #d1d5db;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 8px;
        }

        .sidebar a:hover {
            background: #374151;
        }

        .sidebar a.active {
            background: #4f46e5;
            color: white;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 20px;
        }

        .topbar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .table-box {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .sidebar {
                left: -250px;
                top: 0;
                z-index: 1000;
            }

            .sidebar.active {
                left: 0;
            }

            .main {
                margin-left: 0;
            }
        }
.action-btn {
    padding: 4px 6px;
    font-size: 14px;
    border-radius: 6px;
    transition: all 0.2s ease;
}

/* Hover animation */
.action-btn:hover {
    transform: translateY(-2px) scale(1.1);
    box-shadow: 0 5px 12px rgba(0,0,0,0.2);
}

/* Click animation */
.action-btn:active {
    transform: scale(0.9);
}
        /* DARK MODE */
        body.dark {
            background: #020617;
            color: white;
        }

        body.dark .card-box,
        body.dark .table-box,
        body.dark .topbar {
            background: #1f2937;
        }

        body.dark .table,
        body.dark .table th,
        body.dark .table td {
            background: #1f2937 !important;
            color: white !important;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h4>💼 Payroll</h4>

    <a href="/" class="active">Dashboard</a>
    <a href="/add">Add Employee</a>
    <hr>

    <a href="/logout">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">

        <!-- MOBILE MENU BUTTON -->
        <button class="btn btn-dark d-md-none" onclick="toggleSidebar()">☰</button>

        <h5>Dashboard</h5>

        <button onclick="toggleDark()" class="btn btn-light">🌙</button>
    </div>

    <!-- STATS -->
    <div class="row">
        <div class="col-md-4 col-12 mb-3">
            <div class="card-box">
                <h6>Total Employees</h6>
                <h2>{{ employees|length }}</h2>
            </div>
        </div>

        <div class="col-md-4 col-12 mb-3">
            <div class="card-box">
                <h6>Present Today</h6>
                <h2 class="text-success">{{ present_today }}</h2>
            </div>
        </div>

        <div class="col-md-4 col-12 mb-3">
            <div class="card-box">
                <h6>Absent Today</h6>
                <h2 class="text-danger">{{ absent_today }}</h2>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-box">

        <h5>Employees</h5>

        <div class="table-responsive">
            <table class="table table-hover">

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Salary</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    {% for emp in employees %}
                    <tr>
                        <td>
                            <a href="/employee/{{ emp[0] }}" style="color: antiquewhite; text-decoration: none;">
                                {{ emp[1] }}
                            </a>
                        </td>

                        <td>₹{{ emp[2] }}</td>
<td>
    <div class="d-flex flex-nowrap gap-2 align-items-center">

        <a href="/attendance/{{ emp[0] }}" 
           class="btn btn-warning action-btn"
           data-bs-toggle="tooltip" data-bs-placement="top" title="Mark Attendance">
            <i class="bi bi-calendar-check"></i>
        </a>

        <a href="/calendar/{{ emp[0] }}" 
           class="btn btn-dark action-btn"
           data-bs-toggle="tooltip" data-bs-placement="top" title="View Calendar">
            <i class="bi bi-calendar"></i>
        </a>

        <a href="/calculate/{{ emp[0] }}" 
           class="btn btn-info action-btn"
           data-bs-toggle="tooltip" data-bs-placement="top" title="Calculate Salary">
            <i class="bi bi-cash"></i>
        </a>

        <a href="/payslip/{{ emp[0] }}" 
           class="btn btn-success action-btn"
           data-bs-toggle="tooltip" data-bs-placement="top" title="Download Payslip">
            <i class="bi bi-file-earmark-text"></i>
        </a>

        <a href="/edit/{{ emp[0] }}" 
           class="btn btn-primary action-btn"
           data-bs-toggle="tooltip" data-bs-placement="top" title="Edit Employee">
            <i class="bi bi-pencil"></i>
        </a>

        <a href="/delete/{{ emp[0] }}" 
           class="btn btn-danger action-btn"
           data-bs-toggle="tooltip" data-bs-placement="top" title="Delete Employee">
            <i class="bi bi-trash"></i>
        </a>

    </div>
</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>

</div>

<!-- SCRIPTS -->
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
}


document.addEventListener("DOMContentLoaded", function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
 // Tooltips
    const tooltips = document.querySelectorAll('[data-bs-toggle="tooltip"]');
    tooltips.forEach(el => new bootstrap.Tooltip(el));
});

function toggleDark() {
    document.body.classList.toggle("dark");

    localStorage.setItem(
        "theme",
        document.body.classList.contains("dark") ? "dark" : "light"
    );
}
</script>

</body>
</html>
