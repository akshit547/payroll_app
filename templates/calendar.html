<!DOCTYPE html>
<html>
<head>
    <title>Attendance Calendar</title>

    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <!-- Bootstrap (optional styling) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            font-family: 'Segoe UI', sans-serif;
        }

        .container-box {
            max-width: 1000px;
            margin: 40px auto;
        }

        #calendar {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .legend {
            margin-bottom: 15px;
        }

        .badge-present {
            background-color: #22c55e;
        }

        .badge-absent {
            background-color: #ef4444;
        }
    </style>
    <style>
/* LIGHT (default) */
body {
    background: #f8fafc;
    color: #111827;
}

/* DARK MODE */
body.dark {
    background: #111827;
    color: #f9fafb;
}

/* Cards */
body.dark .card,
body.dark .card-box,
body.dark .table-box {
    background: #1f2937;
    color: white;
}

/* Table */
body.dark table {
    color: white;
}

/* Sidebar */
body.dark .sidebar {
    background: #020617;
}

/* Buttons */
body.dark .btn {
    border: none;
}

/* Topbar */
body.dark .topbar {
    background: #1f2937;
}
</style>
</head>

<body>

<div class="container-box">

    <h3 class="text-center mb-3">📅 {{ employee[1] }} - Attendance</h3>

    <!-- Legend -->
    <div class="text-center legend">
        <span class="badge badge-present text-white px-3 py-2 me-2">Present</span>
        <span class="badge badge-absent text-white px-3 py-2">Absent</span>
    </div>

    <!-- Calendar -->
    <div id="calendar"></div>

</div>

<!-- SAFE JSON DATA -->
<script id="data-json" type="application/json">
    {{ records | tojson | safe }}
</script>

<!-- SCRIPT -->
<script>
    // Get data safely
    const data = JSON.parse(document.getElementById('data-json').textContent);

    // Convert to events
    const events = data.map(r => ({
        title: r[1],
        start: r[0],
        color: r[1] === "present" ? "#22c55e" : "#ef4444"
    }));

    document.addEventListener('DOMContentLoaded', function () {

        const calendarEl = document.getElementById('calendar');

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            height: 650,
            events: events
        });

        calendar.render();
    });
</script>
<script>
function toggleDark() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

// Load saved theme
window.onload = function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
};
</script>
</body>
</html>
