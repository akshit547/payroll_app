<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Calendar — {{ employee[1] }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --surface2: #f8fafc;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --success: #16a34a;
            --success-light: #f0fdf4;
            --danger: #dc2626;
            --danger-light: #fef2f2;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.08);
            --radius: 14px;
            --navbar-bg: #0f172a;
        }

        body.dark {
            --bg: #060d1a;
            --surface: #0f1c2e;
            --surface2: #162035;
            --border: #1e2d42;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-light: #1e3a5f;
            --success-light: #052e16;
            --danger-light: #2d0f0f;
            --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
            --navbar-bg: #020810;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6, .navbar-brand {
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: var(--navbar-bg) !important;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .navbar-brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff !important;
            letter-spacing: -0.3px;
        }

        .navbar-brand span { color: #3b82f6; }

        .theme-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .theme-btn:hover { background: rgba(255,255,255,0.15); }

        /* LAYOUT */
        .main-wrapper {
            max-width: 980px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        /* PAGE HEADER */
        .page-header { margin-bottom: 28px; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 16px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .page-header p {
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        /* STATS ROW */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px 20px;
            transition: background 0.3s, border-color 0.3s;
        }

        .stat-card .stat-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .stat-card .stat-value {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
        }

        .stat-card.present .stat-value { color: var(--success); }
        .stat-card.absent .stat-value  { color: var(--danger); }

        /* LEGEND */
        .legend {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.83rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.present { background: #22c55e; }
        .legend-dot.absent  { background: #ef4444; }

        /* CALENDAR CARD */
        .calendar-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 24px;
            transition: background 0.3s, border-color 0.3s;
        }

        /* FULLCALENDAR OVERRIDES */
        #calendar {
            font-family: 'Inter', sans-serif !important;
        }

        .fc .fc-toolbar-title {
            font-family: 'Poppins', sans-serif !important;
            font-size: 1.1rem !important;
            font-weight: 700 !important;
            color: var(--text) !important;
        }

        .fc .fc-button {
            font-family: 'Inter', sans-serif !important;
            font-size: 0.82rem !important;
            font-weight: 600 !important;
            background: var(--accent) !important;
            border-color: var(--accent) !important;
            border-radius: 8px !important;
            padding: 6px 14px !important;
        }

        .fc .fc-button:hover {
            background: #1d4ed8 !important;
            border-color: #1d4ed8 !important;
        }

        .fc .fc-button-active {
            background: #1d4ed8 !important;
        }

        .fc .fc-col-header-cell-cushion {
            font-family: 'Inter', sans-serif !important;
            font-size: 0.78rem !important;
            font-weight: 600 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.4px !important;
            color: var(--text-muted) !important;
            text-decoration: none !important;
        }

        .fc .fc-daygrid-day-number {
            font-size: 0.82rem !important;
            font-weight: 500 !important;
            color: var(--text) !important;
            text-decoration: none !important;
        }

        .fc .fc-daygrid-day.fc-day-today {
            background: var(--accent-light) !important;
        }

        .fc .fc-event {
            border-radius: 5px !important;
            border: none !important;
            font-size: 0.75rem !important;
            font-weight: 600 !important;
            padding: 2px 6px !important;
            cursor: default !important;
        }

        .fc .fc-event-title {
            text-transform: capitalize !important;
        }

        /* Dark mode calendar fixes */
        body.dark .fc .fc-scrollgrid,
        body.dark .fc .fc-scrollgrid td,
        body.dark .fc .fc-scrollgrid th {
            border-color: var(--border) !important;
        }

        body.dark .fc .fc-daygrid-day {
            background: var(--surface) !important;
        }

        body.dark .fc .fc-daygrid-day.fc-day-today {
            background: var(--accent-light) !important;
        }

        body.dark .fc .fc-daygrid-day:hover {
            background: var(--surface2) !important;
        }

        body.dark .fc .fc-col-header {
            background: var(--surface2) !important;
        }

        body.dark .fc .fc-toolbar {
            background: transparent !important;
        }

        @media (max-width: 600px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .page-header h1 { font-size: 1.5rem; }
            .calendar-card { padding: 14px; }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="/">Payroll<span>.</span></a>
        <button class="theme-btn" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
    </div>
</nav>

<div class="main-wrapper">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <a href="/" class="back-link">← Back to Dashboard</a>
        <h1>📅 {{ employee[1] }}</h1>
        <p>Monthly attendance overview</p>
    </div>

    <!-- STATS ROW -->
    <div class="stats-row">
        <div class="stat-card present">
            <div class="stat-label">Present Days</div>
            <div class="stat-value" id="presentCount">—</div>
        </div>
        <div class="stat-card absent">
            <div class="stat-label">Absent Days</div>
            <div class="stat-value" id="absentCount">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Recorded</div>
            <div class="stat-value" id="totalCount">—</div>
        </div>
    </div>

    <!-- LEGEND -->
    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot present"></div>
            Present
        </div>
        <div class="legend-item">
            <div class="legend-dot absent"></div>
            Absent
        </div>
    </div>

    <!-- CALENDAR -->
    <div class="calendar-card">
        <div id="calendar"></div>
    </div>

</div>

<!-- SAFE JSON DATA -->
<script id="data-json" type="application/json">
    {{ records | tojson | safe }}
</script>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
    // Dark mode
    document.addEventListener("DOMContentLoaded", function () {
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
        }

        // Parse attendance records
        const data = JSON.parse(document.getElementById('data-json').textContent);

        // Count stats
        let presentCount = 0;
        let absentCount = 0;

        const events = data.map(r => {
            if (r[1] === 'present') presentCount++;
            else absentCount++;

            return {
                title: r[1].charAt(0).toUpperCase() + r[1].slice(1),
                start: r[0],
                color: r[1] === 'present' ? '#22c55e' : '#ef4444',
                textColor: '#ffffff'
            };
        });

        // Update stat cards
        document.getElementById('presentCount').textContent = presentCount;
        document.getElementById('absentCount').textContent = absentCount;
        document.getElementById('totalCount').textContent = presentCount + absentCount;

        // Init calendar
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            height: 620,
            events: events,
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,dayGridWeek'
            },
            eventDisplay: 'block',
            dayMaxEvents: 1,
        });

        calendar.render();
    });

    function toggleDark() {
        document.body.classList.toggle("dark");
        localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    }
</script>

</body>
</html>
