<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up — Payroll</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --surface2: #f8fafc;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --success: #16a34a;
            --success-light: #f0fdf4;
            --shadow-md: 0 8px 32px rgba(0,0,0,0.08);
            --radius: 14px;
        }

        body.dark {
            --bg: #060d1a;
            --surface: #0f1c2e;
            --surface2: #162035;
            --border: #1e2d42;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-light: #1e3a5f;
            --success-light: #052e16;
            --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
        }

        /* CARD */
        .signup-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            transition: background 0.3s, border-color 0.3s;
        }

        /* HEADER */
        .card-header-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            background: var(--success-light);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 1.4rem;
        }

        .card-header-section h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .card-header-section p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* FIELDS */
        .field-group {
            margin-bottom: 16px;
        }

        .field-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .field-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--surface2);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s, background 0.3s;
        }

        .field-group input:focus {
            border-color: var(--accent);
            background: var(--surface);
        }

        .field-group input::placeholder {
            color: var(--text-muted);
        }

        /* PASSWORD HINT */
        .field-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* SUBMIT */
        .btn-signup {
            width: 100%;
            padding: 12px;
            background: var(--success);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-signup:hover {
            background: #15803d;
            transform: translateY(-1px);
        }

        .btn-signup:active { transform: scale(0.98); }

        /* FOOTER */
        .card-footer-section {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .card-footer-section a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }

        .card-footer-section a:hover { text-decoration: underline; }

        /* THEME TOGGLE */
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: var(--shadow-md);
            transition: background 0.2s;
        }

        .theme-toggle:hover { background: var(--surface2); }

        @media (max-width: 480px) {
            .signup-card { padding: 28px 20px; }
        }
    </style>
</head>

<body>

<!-- THEME TOGGLE -->
<button class="theme-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>

<!-- SIGNUP CARD -->
<div class="signup-card">

    <div class="card-header-section">
        <div class="brand-icon">🚀</div>
        <h3>Create account</h3>
        <p>Join your team's Payroll system</p>
    </div>

    <form method="POST">

        <div class="field-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Choose a username" required autofocus>
        </div>

        <div class="field-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password" required>
            <div class="field-hint">Use at least 8 characters for a strong password.</div>
        </div>

        <button type="submit" class="btn-signup">Create Account</button>

    </form>

    <div class="card-footer-section">
        Already have an account? <a href="/login">Sign in</a>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
        }
    });

    function toggleDark() {
        document.body.classList.toggle("dark");
        localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    }
</script>

</body>
</html>
