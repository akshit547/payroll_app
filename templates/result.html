<!DOCTYPE html>
<html>
<head>
    <title>Salary Result</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
            transition: 0.3s;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .btn {
            border-radius: 10px;
        }

        .navbar {
            border-radius: 0 0 15px 15px;
        }

        /* DARK MODE */
        body.dark {
            background: linear-gradient(135deg, #020617, #0f172a);
            color: #f9fafb;
        }

        body.dark .card {
            background: #1f2937;
            color: white;
        }

        body.dark .navbar {
            background: #020617 !important;
        }

        body.dark .btn {
            border: none;
        }

        /* Fix Bootstrap bg-light */
        body.dark.bg-light {
            background: linear-gradient(135deg, #020617, #0f172a) !important;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container d-flex justify-content-between">
    <a class="navbar-brand" href="/">Payroll App</a>

    <button onclick="toggleDark()" class="btn btn-light" style="border-radius:50%;">
        🌙
    </button>
  </div>
</nav>

<!-- MAIN -->
<div class="container mt-5 text-center">

    <div class="card shadow p-4">

        <h2>{{ name }}</h2>

        <p>Total Late/Early Minutes: {{ minutes }}</p>
<p>Total Deduction: ₹{{ penalty }}</p>
<h3>Final Salary: ₹{{ total }}</h3>

        <a href="/" class="btn btn-primary mt-3">Back to Home</a>

    </div>

</div>

<!-- DARK MODE SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
});

function toggleDark() {
    document.body.classList.toggle("dark");

    localStorage.setItem(
        "theme",
        document.body.classList.contains("dark") ? "dark" : "light"
    );
}
</script>

</body>
</html>
