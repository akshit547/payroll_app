<!DOCTYPE html>
<html>
<head>
    <title>Salary Result</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Payroll App</a>
    <button class="btn btn-outline-light" onclick="toggleDarkMode()">🌙</button>
  </div>
</nav>

<div class="container mt-5 text-center">

    <div class="card shadow p-4">

        <h2>{{ name }}</h2>

        <p>Days Worked: {{ days }}</p>
        <p>Overtime: ₹{{ overtime }}</p>
        <p>Bonus: ₹{{ bonus }}</p>

        <h3 class="text-success">Total Salary: ₹{{ total }}</h3>

        <a href="/" class="btn btn-primary mt-3">Back to Home</a>

    </div>

</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("bg-dark");
    document.body.classList.toggle("text-light");

    document.querySelectorAll(".card").forEach(c => c.classList.toggle("bg-secondary"));

    if (document.body.classList.contains("bg-dark")) {
        localStorage.setItem("darkMode", "on");
    } else {
        localStorage.setItem("darkMode", "off");
    }
}

window.onload = function() {
    if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("bg-dark", "text-light");

        document.querySelectorAll(".card").forEach(c => c.classList.add("bg-secondary"));
    }
}
</script>

</body>
</html>
