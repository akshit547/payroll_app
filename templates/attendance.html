<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Payroll Dashboard</a>
  </div>
</nav>

<div class="container mt-5">

    <!-- Employee Name -->
    <h2 class="mb-4">{{ employee[1] }}</h2>

    <!-- Mark Today -->
    <div class="card p-4 mb-4 shadow-sm">
        <h5>Mark Attendance for Today ({{ today }})</h5>

        <form method="POST" class="mt-3">
            <button name="status" value="present" class="btn btn-success me-2">
                ✅ Present
            </button>

            <button name="status" value="absent" class="btn btn-danger">
                ❌ Absent
            </button>
        </form>
    </div>

    <!-- Attendance History -->
    <div class="card p-4 shadow-sm">

        <h5>Attendance History</h5>

        <table class="table mt-3">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                {% for r in records %}
                <tr>
                    <td>{{ r[0] }}</td>
                    <td>
                        {% if r[1] == 'present' %}
                            <span class="badge bg-success">Present</span>
                        {% else %}
                            <span class="badge bg-danger">Absent</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
