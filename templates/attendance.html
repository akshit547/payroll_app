<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
            transition: 0.3s;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .btn {
            border-radius: 10px;
        }

        .navbar {
            border-radius: 0 0 15px 15px;
        }

        .table {
            border-radius: 10px;
            overflow: hidden;
        }

        /* 🔥 DARK MODE (MAIN FIX) */
        body.dark {
            background: linear-gradient(135deg, #020617, #0f172a);
            color: #f9fafb;
        }

        body.dark .card {
            background: #1f2937;
            color: white;
        }

        body.dark .navbar {
            background: #020617 !important;
        }

        /* FIX TABLE (IMPORTANT) */
        body.dark .table,
        body.dark .table th,
        body.dark .table td {
            background-color: #1f2937 !important;
            color: white !important;
        }

        body.dark .table thead {
            background-color: #374151 !important;
        }

        body.dark .table tbody tr:hover {
            background-color: #2d3748 !important;
        }

        /* REMOVE bootstrap bg-light effect */
        body.dark.bg-light {
            background: linear-gradient(135deg, #020617, #0f172a) !important;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container d-flex justify-content-between">
    <a class="navbar-brand" href="/">Payroll Dashboard</a>

    <!-- DARK MODE BUTTON -->
    <button onclick="toggleDark()" class="btn btn-light" style="border-radius:50%;">
        🌙
    </button>
  </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">{{ employee[1] }}</h2>

    <!-- MARK ATTENDANCE -->
    <div class="card p-4 mb-4 shadow-sm">
        <h5>Mark Attendance for Today ({{ today or "not recieved"}})</h5>

        <form method="POST" class="mt-3">
            <button name="status" value="present" class="btn btn-success me-2">
                ✅ Present
            </button>

            <button name="status" value="absent" class="btn btn-danger">
                ❌ Absent
            </button>
            <label>Check-in Time:</label>
<input type="time" name="check_in_time" required>

<label>Check-out Time:</label>
<input type="time" name="check_out_time" required>
        </form>
    </div>

    <!-- HISTORY -->
    <div class="card p-4 shadow-sm">

        <h5>Attendance History</h5>

        <table class="table table-hover mt-3">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                {% for r in records %}
                <tr>
                    <td>{{ r[0] }}</td>
                    <td>
                        {% if r[1] == 'present' %}
                            <span class="badge bg-success">Present</span>
                        {% else %}
                            <span class="badge bg-danger">Absent</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

<!-- DARK MODE SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
});

function toggleDark() {
    document.body.classList.toggle("dark");

    localStorage.setItem(
        "theme",
        document.body.classList.contains("dark") ? "dark" : "light"
    );
}
</script>

</body>
</html>
